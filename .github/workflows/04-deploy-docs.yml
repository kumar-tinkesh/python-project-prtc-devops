name: 04 - Deploy Documentation (Docs Repo)

# ⚠️  IMPORTANT: This workflow should run in the DOCS REPOSITORY, not the main repo
# Move this file to: your-docs-repo/.github/workflows/deploy.yml
# Delete this file from the main repo after setting up the docs repo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout docs repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Check for mkdocs.yml
        run: |
          if [ ! -f "mkdocs.yml" ]; then
            echo "❌ ERROR: mkdocs.yml not found!"
            echo "This workflow should run in the docs repository."
            echo "Please move this workflow to your docs repo."
            exit 1
          fi
          echo "✅ mkdocs.yml found"
      
      - name: Install dependencies
        run: |
          echo "📦 Installing MkDocs..."
          pip install mkdocs-material
          pip install -r requirements-docs.txt 2>/dev/null || true
          echo "✅ Dependencies installed"
      
      - name: Build documentation
        run: |
          mkdocs build --strict
      
      - name: Upload build artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Trigger search reindex
        if: env.ALGOLIA_API_KEY != ''
        env:
          ALGOLIA_API_KEY: ${{ secrets.ALGOLIA_API_KEY }}
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
        run: |
          echo "Triggering search reindex..."
          curl -X POST "https://${ALGOLIA_APP_ID}.algolia.net/1/indexes/*/batch" \
            -H "X-Algolia-Application-Id: ${ALGOLIA_APP_ID}" \
            -H "X-Algolia-API-Key: ${ALGOLIA_API_KEY}" \
            -d '{"requests":[]}' || true
      
      - name: Post deployment summary
        run: |
          echo "## 🚀 Documentation Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Site deployed successfully to GitHub Pages!" >> $GITHUB_STEP_SUMMARY
