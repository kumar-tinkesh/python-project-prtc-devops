name: Test - Lint Check on Main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Run Linter
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install flake8
        run: |
          pip install flake8
      
      - name: Run flake8 linting
        run: |
          echo "🔍 Running flake8 linting on Python files..."
          # Check all Python files, ignore minor issues
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.git,venv,__pycache__ || true
          echo "✅ Lint check complete"
      
      - name: Test workflow trigger
        run: |
          echo "🎉 GitHub Actions workflow is working!"
          echo "Triggered by: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
      
      - name: Post success comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Lint check passed!**\n\nGitHub Actions workflow is working correctly.'
            })
