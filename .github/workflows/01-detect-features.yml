name: 01 - Feature Detection & Analysis

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Run in test mode (dry run)'
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  detect-features:
    name: Detect Changed Features
    runs-on: ubuntu-latest
    outputs:
      feature_matrix: ${{ steps.detect.outputs.feature_matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
      unmapped_files: ${{ steps.detect.outputs.unmapped_files }}
      change_summary: ${{ steps.detect.outputs.change_summary }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/.github/scripts/**/*.py') }}
      
      - name: Install dependencies
        run: |
          pip install pyyaml requests
      
      - name: Get changed files
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            git log --format="" --name-only ${{ github.event.before }}..${{ github.sha }} | \
              sort -u | grep -v "^$" > changed_files.txt || true
          else
            git log --format="" --name-only -1 | sort -u | grep -v "^$" > changed_files.txt || true
          fi
          
          echo "Changed files:"
          cat changed_files.txt || echo "No changes detected"
          
          # Create JSON array
          files_json=$(cat changed_files.txt 2>/dev/null | jq -R . | jq -s . | tr -d '\n')
          echo "files=$files_json" >> $GITHUB_OUTPUT
      
      - name: Run feature detection
        id: detect
        run: |
          if [ ! -s changed_files.txt ]; then
            echo "feature_matrix={\"features\": []}" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "unmapped_files=[]" >> $GITHUB_OUTPUT
            echo "change_summary={}" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          python .github/scripts/feature-mapper.py \
            --changed-files changed_files.txt \
            --output feature_report.json \
            --config docs/.ai-docs-config.yml
          
          FEATURES=$(jq -c '.affected_features | map(.id)' feature_report.json)
          HAS_CHANGES=$(jq '.affected_features | length > 0' feature_report.json)
          UNMAPPED=$(jq -c '.unmapped_files' feature_report.json)
          SUMMARY=$(jq -c '.' feature_report.json)
          
          echo "feature_matrix={\"features\": $FEATURES}" >> $GITHUB_OUTPUT
          echo "has_changes=$HAS_CHANGES" >> $GITHUB_OUTPUT
          echo "unmapped_files=$UNMAPPED" >> $GITHUB_OUTPUT
          echo "change_summary=$SUMMARY" >> $GITHUB_OUTPUT
          
          echo "=== Feature Detection Report ==="
          cat feature_report.json | jq .
      
      - name: Upload detection report
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: feature-detection-report
          path: feature_report.json
          retention-days: 30

  validate-detection:
    name: Validate Detection Results
    needs: detect-features
    if: needs.detect-features.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check for unmapped files
        run: |
          UNMAPPED='${{ needs.detect-features.outputs.unmapped_files }}'
          COUNT=$(echo "$UNMAPPED" | jq 'length')
          
          if [ "$COUNT" -gt 0 ]; then
            echo "⚠️ Found $COUNT unmapped files:"
            echo "$UNMAPPED" | jq -r '.[]'
            
            if [ "$COUNT" -gt 5 ]; then
              echo "::warning::High number of unmapped files. Consider updating docs/.ai-docs-config.yml"
            fi
          fi
      
      - name: Check for multi-feature PR
        run: |
          MATRIX='${{ needs.detect-features.outputs.feature_matrix }}'
          COUNT=$(echo "$MATRIX" | jq '.features | length')
          
          echo "This change affects $COUNT features"
          
          if [ "$COUNT" -gt 5 ]; then
            echo "::notice::Multi-feature change detected. Documentation will be split into multiple commits."
          fi
      
      - name: Post summary
        run: |
          echo "## 📊 Feature Detection Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          SUMMARY='${{ needs.detect-features.outputs.change_summary }}'
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          echo "$SUMMARY" | jq . >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
